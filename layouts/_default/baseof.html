<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Site.Params.description }}">

  <title>{{ .Title }} | {{ .Site.Params.keywords }}</title>

  <!-- hreflang Tags -->
  <link rel="alternate" href="{{ .Permalink }}" hreflang="de" />
  <link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/images/a/favicon.webp" />
  <link rel="apple-touch-icon" href="/images/a/apple-touch-icon.png">
  <link rel="canonical" href="{{ .Permalink | safeURL }}">

  {{ with .Site.Params.languages }}
  {{ range . }}
    <link rel="alternate" hreflang="{{ .code }}" href="{{ .permalink }}">
  {{ end }}
  {{ end }}

  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://überrenditen.de/",
      "name": "überrenditen",
      "alternateName": "Value Investing - Werde erfolgreich wie Warren Buffett!",
      "description": "{{ .Site.Params.description }}",
      "publisher": {
        "@type": "Organization",
        "name": "überrenditen",
        "logo": {
          "@type": "ImageObject",
          "url": "https://überrenditen.de/images/a/value-investing.webp",
          "width": 600,
          "height": 60
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://überrenditen.de/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>

<body itemscope itemtype="http://schema.org/WebPage">

<!-- Header mit Navigation -->
<header role="banner">
  <nav class="navbar" role="navigation" style="display: flex; justify-content: space-between; align-items: center;">
    <div class="logo" itemscope itemtype="http://schema.org/Organization" style="display: flex; align-items: center;">
      <a href="{{ .Site.BaseURL }}" title="Value Investor " style="display: flex; align-items: center;">
        <img src="/images/a/aktien.webp" alt="Value Investor" itemprop="logo" title="Value Investing" style="width: 50px; height: 50px; margin-right: 0px;" />
        <p style="margin: 0; font-size: 22px; font-weight: bold; padding-top: 15px;"> Überrenditen.de</p>
      </a>
      
      <meta itemprop="name" content="überrenditen">

      
    </div>

  </nav>
</header>

<div class="container">
  <!-- Main Content Bereich -->
  <main role="main" itemscope itemtype="http://schema.org/Article">
    {{ block "main" . }}
    {{ end }}
  </main>

  <!-- Section für zusätzliche Inhalte, falls notwendig -->
  <section role="region" itemscope itemtype="http://schema.org/Section">
    {{ block "additional-content" . }}
    {{ end }}
  </section>

  {{ partial "footer.html" . }}

  {{ partial "cookies.html" . }}

  <!-- Optional: Sidebar oder verwandte Inhalte -->
  <aside role="complementary">
    <!-- Werbung oder verwandte Inhalte -->
  </aside>

  <!-- CSS für die Auflistung -->
  <style>


    /* Flexbox-Wrapper für Bild links und Text rechts im Vollbildmodus */
    .image-text-wrapper {
      display: flex; gap: 15px; justify-content: flex-start; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
    }










      

    .image-text-wrapper:hover {
      background-color: #3a4da5;
      color: white; /* Hintergrundfarbe beim Hover */
    }

    .listItemImage {
      width: 40%; /* Bild nimmt 40% der Breite ein */
      height: auto;
      object-fit: cover;
      border-radius: 4px; /* Eckenabrundung für das Bild */
      margin-right: 10px; /* Abstand zwischen Bild und Text */
    }

    .listItemContent {
      width: 60%; /* Text nimmt 60% der Breite ein */
      margin-top: 0; /* Kein Abstand zwischen Bild und Text */
    }

    .listItemTags {
      margin-top: 10px; /* Abstand zwischen Titel und Tags */
    }

    /* Layout-Anpassungen für kleinere Bildschirme */
    @media (max-width: 768px) {
      .list {
        grid-template-columns: 1fr; /* Ein Blogbeitrag pro Zeile */
      }

      .image-text-wrapper {
        flex-direction: column; /* Bild oben, Text unten auf kleinen Bildschirmen */
      }

      .listItemImage {
        width: 100%; /* Bild nimmt volle Breite ein */
        margin-right: 0; /* Kein Abstand zwischen Bild und Text */
      }

      .listItemContent {
        width: 100%; /* Text nimmt volle Breite ein */
      }
    }
  </style>

</div>
</body>

</html>
