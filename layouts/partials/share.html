
<head>
  <!-- Standard Meta-Tags -->
  <meta charset="UTF-8">

  <title>{{ .Title }}</title>

<!-- Twitter Card Meta-Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }} | HiValueInvestor">
<meta name="twitter:description" content="{{ .Summary }}">
<meta name="twitter:image" content="{{ .Params.featuredImage }}">
<meta name="twitter:url" content="{{ .Permalink }}">
<meta name="twitter:site" content="@HiValueInvestor">
<meta name="twitter:creator" content="@HiValueInvestor"> <!-- Optional: Twitter Handle des Autors -->

<!-- Open Graph Meta-Tags -->
<meta property="og:title" content="{{ .Title }} | HiValueInvestor">

<meta property="og:url" content="{{ .Permalink }}">
